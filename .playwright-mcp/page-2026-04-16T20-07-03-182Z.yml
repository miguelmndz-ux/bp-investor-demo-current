          - generic [ref=e369]: / 10 — Proficient
          - generic [ref=e370]: 3–5 hrs
          - generic [ref=e371]: cumulative practice
          - list [ref=e372]:
            - listitem [ref=e373]: – Completed all 4 input modes at least once
            - listitem [ref=e374]: – Can navigate every editor panel
