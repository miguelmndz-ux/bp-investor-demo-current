      - generic [ref=e296]: Learning Path
      - heading "Your Velo learning journey" [level=2] [ref=e298]
      - paragraph [ref=e299]: An opinionated, experience-optimized path to go from zero to Velo expert. Designed for practitioners who learn by doing.
      - generic [ref=e300]:
        - generic [ref=e302]:
          - generic [ref=e303]: "1"
          - generic [ref=e304]: Read the Introduction & Quickstart Docs
          - paragraph [ref=e305]: Start at docs.usevelo.ai. Read the Introduction and Quickstart pages. Understand the four input modes and what makes Velo different from Loom or Camtasia. Orient yourself to the mental model before touching the app.
          - generic [ref=e306]:
            - generic [ref=e307]: schedule
            - text: 20–30 min
        - generic [ref=e308]:
          - generic [ref=e309]: "2"
          - generic [ref=e310]: Create your first Velo via Screen Capture
          - paragraph [ref=e311]: Install the Chrome Extension. Record a simple 2–3 minute product walkthrough of anything familiar. Accept the AI-generated script without editing it the first time — just see the full output pipeline end to end. Share via link.
          - generic [ref=e312]:
            - generic [ref=e313]: schedule
            - text: 45–60 min
        - generic [ref=e314]:
          - generic [ref=e315]: "3"
          - generic [ref=e316]: Explore the Editor — Every Panel
          - paragraph [ref=e317]: Open the output from step 2 in the editor. Systematically click through every right sidebar panel and every timeline track. Change the background, adjust cursor style, add a callout, try a zoom block. You're mapping the terrain, not producing anything.
          - generic [ref=e318]:
            - generic [ref=e319]: schedule
            - text: 30–45 min
        - generic [ref=e320]:
          - generic [ref=e321]: "4"
          - generic [ref=e322]: Try all four Input Modes
          - paragraph [ref=e323]: "Create one Velo from each mode: upload an existing MP4 (a Zoom recording works well), upload a PDF deck, and paste a URL for a simple SaaS product. This gives you intuition for when to use each mode vs. the others."
          - generic [ref=e324]:
            - generic [ref=e325]: schedule
            - text: 1.5–2 hrs
        - generic [ref=e326]:
          - generic [ref=e327]: "5"
          - generic [ref=e328]: Create & Calibrate Your VeloTwin
          - paragraph [ref=e329]: Go to the VeloTwin section and create your custom avatar. Read the best practices first (lighting, background, eye contact, voice pacing). Create it, then produce one Velo using your VeloTwin face and voice. Evaluate the output critically and tweak if needed.
          - generic [ref=e330]:
            - generic [ref=e331]: schedule
            - text: 45–90 min
        - generic [ref=e332]:
          - generic [ref=e333]: "6"
          - generic [ref=e334]: Master Script Editing & Context Prompting
          - paragraph [ref=e335]: "Produce a real-world demo for your product or project. This time: edit the AI script before generating, use the rewrite-with-context feature to align tone (e.g., \"executive audience, skip technical detail\"), and try at least 2 retries to understand how different scripts diverge."
          - generic [ref=e336]:
            - generic [ref=e337]: schedule
            - text: 1–2 hrs
        - generic [ref=e338]:
          - generic [ref=e339]: "7"
          - generic [ref=e340]: Build a Production-Quality Demo
          - paragraph [ref=e341]: Create a demo you'd actually send to a prospect or stakeholder. Use brand kit, a proper intro card, custom cursor, appropriate zoom blocks and spotlights, clean masking of any sensitive data, and your VeloTwin. Share it and collect feedback.
          - generic [ref=e342]:
            - generic [ref=e343]: schedule
            - text: 2–3 hrs
        - generic [ref=e344]:
          - generic [ref=e345]: "8"
          - generic [ref=e346]: Develop Workflow Patterns & Templates
          - paragraph [ref=e347]: "After 5–10 real demos, identify your repeatable patterns: which input mode works best for your content type, what brand kit settings you prefer, standard zoom/spotlight sequences, script tone guidance you always provide. Document these as your personal Velo playbook."
          - generic [ref=e348]:
            - generic [ref=e349]: schedule
            - text: Ongoing
