      - heading "How long to become a Velo expert?" [level=2] [ref=e364]
      - paragraph [ref=e365]: For an experienced developer who already understands AI coding/tooling best practices — context management, prompting, workflow structuring. Hours are cumulative active practice time, not calendar time.
