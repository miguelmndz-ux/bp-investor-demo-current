          - generic [ref=e394]: / 10 — Expert
          - generic [ref=e395]: 40–60 hrs
          - generic [ref=e396]: cumulative practice
          - list [ref=e397]:
            - listitem [ref=e398]: – Can teach others the full Velo system
            - listitem [ref=e399]: – Builds reusable demo templates & personas
            - listitem [ref=e400]: – Pushes edge cases (long-form, complex flows)
