                          - generic [ref=f2e157]: Connection Drops
                          - paragraph [ref=f2e158]: If your internet disconnects mid-recording, the upload fails silently. Record on a stable connection and keep the browser tab active throughout.
                        - generic [ref=f2e159]:
                          - generic [ref=f2e160]: Blocked Permissions
                          - paragraph [ref=f2e161]: If Chrome doesn't ask to use your mic, permissions are blocked. Go to Chrome Settings → Privacy → Microphone and allow velo.video.
                        - generic [ref=f2e162]:
                          - generic [ref=f2e163]: Full Desktop vs. Tab
                          - paragraph [ref=f2e164]: Sharing full desktop includes your taskbar, notifications, and other apps. Always share a specific tab unless you genuinely need multi-app coverage in your demo.
