                        - generic [ref=f1e291]: Read the Introduction & Quickstart Docs
                        - paragraph [ref=f1e292]: Start at docs.usevelo.ai. Read the Introduction and Quickstart pages. Understand the four input modes and what makes Velo different from Loom or Camtasia. Orient yourself to the mental model before touching the app.
