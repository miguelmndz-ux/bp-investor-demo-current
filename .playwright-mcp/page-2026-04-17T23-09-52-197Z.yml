                      - 'heading "Step 1: Install & Pin the Velo Companion Extension" [level=3] [ref=f2e85]'
                      - list [ref=f2e86]:
                        - listitem [ref=f2e87]:
                          - generic [ref=f2e88]:
                            - text: Open Chrome and go to the Chrome Web Store. Search
                            - strong [ref=f2e89]: "\"Velo Companion\""
                            - text: .
                        - listitem [ref=f2e90]:
                          - generic [ref=f2e91]:
                            - text: Click
                            - strong [ref=f2e92]: Add to Chrome
                            - text: . When prompted, click
                            - strong [ref=f2e93]: Add extension
                            - text: .
                        - listitem [ref=f2e94]:
                          - generic [ref=f2e95]:
                            - text: In your Chrome toolbar, click the puzzle piece icon (Extensions menu). Find Velo Companion and click the
                            - strong [ref=f2e96]: pin icon
                            - text: so it always shows in your toolbar.
                        - listitem [ref=f2e97]:
                          - generic [ref=f2e98]: Confirm the Velo icon appears in your toolbar. If it doesn't, the extension didn't install — try again in a fresh Chrome window.
                      - 'heading "Step 2: Set Up Your Recording" [level=3] [ref=f2e99]'
                      - paragraph [ref=f2e100]: "Click the Velo Companion icon to open the recording launcher. Before you hit Record, configure three things:"
                      - generic [ref=f2e101]:
                        - generic [ref=f2e102]:
                          - generic [ref=f2e103]: Window / Tab Selection
                          - paragraph [ref=f2e104]:
                            - text: Choose
                            - strong [ref=f2e105]: Tab
                            - text: to capture a single browser tab (recommended — cleaner background). Use
                            - strong [ref=f2e106]: Window
                            - text: only if your demo spans multiple apps.
                        - generic [ref=f2e107]:
                          - generic [ref=f2e108]: Resolution
                          - paragraph [ref=f2e109]: Record at your screen's native resolution. Don't zoom in your browser before recording — Velo handles visual zoom in the editor afterward.
                        - generic [ref=f2e110]:
                          - generic [ref=f2e111]: Microphone Check
                          - paragraph [ref=f2e112]: Confirm the correct mic is selected. Speak a test phrase. If the level bar doesn't move, switch input devices before proceeding.
                      - 'heading "Step 3: Record Well" [level=3] [ref=f2e113]'
                      - paragraph [ref=f2e114]: "Your narration and cursor movement directly shape the AI script Velo generates. Use this technique:"
                      - list [ref=f2e115]:
                        - listitem [ref=f2e116]:
                          - strong [ref=f2e117]: Slow your clicks.
                          - text: Pause 1–2 seconds after each click so Velo can recognize the action before you move on.
                        - listitem [ref=f2e118]:
                          - strong [ref=f2e119]: Narrate naturally.
                          - text: Speak like you're showing a colleague — avoid scripting or over-enunciating. The AI rewrites it anyway.
                        - listitem [ref=f2e120]:
                          - strong [ref=f2e121]: Pause before transitions.
                          - text: When moving between sections of the product, take a breath. This gives Velo clean segment breaks.
                        - listitem [ref=f2e122]:
                          - strong [ref=f2e123]: Filler words are fine.
                          - text: "\"Um\", \"uh\", and \"so\" are stripped by the AI. Long mid-sentence pauses are more disruptive than filler words."
                      - 'heading "Step 4: What Happens After You Stop Recording" [level=3] [ref=f2e124]'
                      - paragraph [ref=f2e125]:
                        - text: When you click
                        - strong [ref=f2e126]: Stop
                        - text: ", Velo's AI pipeline starts immediately. Do not close the tab. Here's what's happening:"
                      - list [ref=f2e127]:
                        - listitem [ref=f2e128]:
                          - generic [ref=f2e129]: Velo analyzes your recording — cursor position, click events, timing, and UI content visible on screen.
                        - listitem [ref=f2e130]:
                          - generic [ref=f2e131]: "A script is generated: one line per segment, one segment per distinct action."
                        - listitem [ref=f2e132]:
                          - generic [ref=f2e133]: The script is passed to the voice engine, which reads it using your selected VeloTwin voice.
                        - listitem [ref=f2e134]:
                          - generic [ref=f2e135]: The avatar is composited over the video — face, lip sync, and eye movement all happen at this stage.
                        - listitem [ref=f2e136]:
                          - generic [ref=f2e137]: You're placed into the Velo editor with the finished draft ready to review.
                      - generic [ref=f2e138]:
                        - strong [ref=f2e139]: "Processing time:"
                        - text: A 3-minute recording typically takes 3–8 minutes to process, depending on server load. Don't refresh the page — processing continues in the background even if the progress indicator looks stuck.
                      - 'heading "Step 5: Your First Look at the Editor" [level=3] [ref=f2e140]'
                      - paragraph [ref=f2e141]: "In this module, accept the auto-generated script as-is. Don't edit yet — script editing is covered in Module 5. For now, just observe:"
                      - list [ref=f2e142]:
                        - listitem [ref=f2e143]:
                          - text: The
                          - strong [ref=f2e144]: Scripts panel
                          - text: (right sidebar) shows the narration text broken into segments. Each line corresponds to one video chunk.
                        - listitem [ref=f2e145]:
                          - text: The
                          - strong [ref=f2e146]: timeline
                          - text: at the bottom shows your video laid out over time. Each segment appears as a block.
                        - listitem [ref=f2e147]:
                          - text: The
                          - strong [ref=f2e148]: Face panel
                          - text: (right sidebar) lets you choose or switch your VeloTwin voice and avatar.
                      - 'heading "Step 6: Choose a Public VeloTwin & Publish" [level=3] [ref=f2e149]'
                      - paragraph [ref=f2e150]: If you don't have a custom VeloTwin yet, open the Face panel and choose one of Velo's public avatars. Pick one whose tone matches your content — professional and neutral is a safe default for a first video.
                      - paragraph [ref=f2e151]:
                        - text: Once you've selected a voice, click
                        - strong [ref=f2e152]: Publish
                        - text: . Velo finalizes the render and generates your
                        - strong [ref=f2e153]: share link
                        - text: . Copy it and open it in a new tab to see exactly what your recipients will see.
