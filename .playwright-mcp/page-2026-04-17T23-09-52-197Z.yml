                        - paragraph [ref=f2e183]: "Goal: complete a full Velo production loop — from recording to share link — in one session."
                        - list [ref=f2e184]:
                          - listitem [ref=f2e185]: Open Chrome and navigate to any product or app you know well. It can be a simple settings page or a website you use daily.
                          - listitem [ref=f2e186]: Click the Velo Companion icon, configure your recording (select the tab, confirm mic is active), and click Record.
                          - listitem [ref=f2e187]: Record a 60–90 second walkthrough. Narrate naturally, slow your clicks, and pause between sections. Stop the recording when done.
                          - listitem [ref=f2e188]: Wait for processing to complete. Do not close the tab or refresh.
                          - listitem [ref=f2e189]: When the editor loads, open the Scripts panel and read the auto-generated script. Note what the AI captured accurately and where it missed the point — you'll learn to fix this in Module 5.
