          - generic [ref=e76]: Understand what Velo is, how its AI pipeline works, and which plan you need before touching the app.
        - paragraph [ref=e77]:
          - text: Before you record your first video, it helps to understand what Velo actually does under the hood. Velo is not a screen recorder like Loom or Zoom. It is an
          - strong [ref=e78]: AI video production tool
          - text: — you give it raw input (a recording, slides, or a URL), and it returns a polished video with a script, an AI voice, and an AI avatar.
        - heading "What Velo Is (and Is Not)" [level=3] [ref=e79]
        - generic [ref=e80]:
          - generic [ref=e81]:
            - generic [ref=e82]: Velo IS
            - paragraph [ref=e83]: An AI pipeline that takes raw input and produces a script + voice + avatar composited video. Great for product demos, onboarding, and sales content.
          - generic [ref=e84]:
            - generic [ref=e85]: Velo is NOT
            - paragraph [ref=e86]: A basic screen recorder (not Loom), a video editor (not Camtasia), or an audio enhancer. It rewrites the narrative from scratch.
        - heading "The Full AI Pipeline" [level=3] [ref=e87]
        - paragraph [ref=e88]: "Every Velo video — no matter which input mode you use — travels through the same five-step pipeline:"
        - list [ref=e89]:
          - listitem [ref=e90]:
            - generic [ref=e91]:
              - strong [ref=e92]: Raw Input
              - text: — You provide a screen recording, uploaded file, slides, or a URL.
          - listitem [ref=e93]:
            - generic [ref=e94]:
              - strong [ref=e95]: Script Generation
              - text: — Velo's AI analyzes what it sees (cursor movement, UI elements, timing) and writes a narration script.
          - listitem [ref=e96]:
            - generic [ref=e97]:
              - strong [ref=e98]: Voice Cloning
              - text: — The script is read aloud using your VeloTwin voice (or a public voice if you don't have one yet).
          - listitem [ref=e99]:
            - generic [ref=e100]:
              - strong [ref=e101]: Avatar Compositing
              - text: — Your AI face is overlaid on the video, lip-synced to the voice.
          - listitem [ref=e102]:
            - generic [ref=e103]:
              - strong [ref=e104]: Share Link
              - text: — Velo publishes the finished video and gives you a shareable URL — no download required.
