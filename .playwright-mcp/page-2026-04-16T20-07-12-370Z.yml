        - paragraph [ref=e78]:
          - text: Before you record your first video, it helps to understand what Velo actually does under the hood. Velo is not a screen recorder like Loom or Zoom. It is an
          - strong [ref=e79]: AI video production tool
          - text: — you give it raw input (a recording, slides, or a URL), and it returns a polished video with a script, an AI voice, and an AI avatar.
        - heading "What Velo Is (and Is Not)" [level=3] [ref=e80]
        - generic [ref=e81]:
          - generic [ref=e82]:
            - generic [ref=e83]: Velo IS
            - paragraph [ref=e84]: An AI pipeline that takes raw input and produces a script + voice + avatar composited video. Great for product demos, onboarding, and sales content.
          - generic [ref=e85]:
            - generic [ref=e86]: Velo is NOT
            - paragraph [ref=e87]: A basic screen recorder (not Loom), a video editor (not Camtasia), or an audio enhancer. It rewrites the narrative from scratch.
        - heading "The Full AI Pipeline" [level=3] [ref=e88]
        - paragraph [ref=e89]: "Every Velo video — no matter which input mode you use — travels through the same five-step pipeline:"
        - list [ref=e90]:
          - listitem [ref=e91]:
            - generic [ref=e92]:
              - strong [ref=e93]: Raw Input
              - text: — You provide a screen recording, uploaded file, slides, or a URL.
          - listitem [ref=e94]:
            - generic [ref=e95]:
              - strong [ref=e96]: Script Generation
              - text: — Velo's AI analyzes what it sees (cursor movement, UI elements, timing) and writes a narration script.
          - listitem [ref=e97]:
            - generic [ref=e98]:
              - strong [ref=e99]: Voice Cloning
              - text: — The script is read aloud using your VeloTwin voice (or a public voice if you don't have one yet).
          - listitem [ref=e100]:
            - generic [ref=e101]:
              - strong [ref=e102]: Avatar Compositing
              - text: — Your AI face is overlaid on the video, lip-synced to the voice.
          - listitem [ref=e103]:
            - generic [ref=e104]:
              - strong [ref=e105]: Share Link
              - text: — Velo publishes the finished video and gives you a shareable URL — no download required.
