        - paragraph [ref=e79]:
          - text: Before you record your first video, it helps to understand what Velo actually does under the hood. Velo is not a screen recorder like Loom or Zoom. It is an
          - strong [ref=e80]: AI video production tool
          - text: — you give it raw input (a recording, slides, or a URL), and it returns a polished video with a script, an AI voice, and an AI avatar.
        - heading "What Velo Is (and Is Not)" [level=3] [ref=e81]
        - generic [ref=e82]:
          - generic [ref=e83]:
            - generic [ref=e84]: Velo IS
            - paragraph [ref=e85]: An AI pipeline that takes raw input and produces a script + voice + avatar composited video. Great for product demos, onboarding, and sales content.
          - generic [ref=e86]:
            - generic [ref=e87]: Velo is NOT
            - paragraph [ref=e88]: A basic screen recorder (not Loom), a video editor (not Camtasia), or an audio enhancer. It rewrites the narrative from scratch.
        - heading "The Full AI Pipeline" [level=3] [ref=e89]
        - paragraph [ref=e90]: "Every Velo video — no matter which input mode you use — travels through the same five-step pipeline:"
        - list [ref=e91]:
          - listitem [ref=e92]:
            - generic [ref=e93]:
              - strong [ref=e94]: Raw Input
              - text: — You provide a screen recording, uploaded file, slides, or a URL.
          - listitem [ref=e95]:
            - generic [ref=e96]:
              - strong [ref=e97]: Script Generation
              - text: — Velo's AI analyzes what it sees (cursor movement, UI elements, timing) and writes a narration script.
          - listitem [ref=e98]:
            - generic [ref=e99]:
              - strong [ref=e100]: Voice Cloning
              - text: — The script is read aloud using your VeloTwin voice (or a public voice if you don't have one yet).
          - listitem [ref=e101]:
            - generic [ref=e102]:
              - strong [ref=e103]: Avatar Compositing
              - text: — Your AI face is overlaid on the video, lip-synced to the voice.
          - listitem [ref=e104]:
            - generic [ref=e105]:
              - strong [ref=e106]: Share Link
              - text: — Velo publishes the finished video and gives you a shareable URL — no download required.
