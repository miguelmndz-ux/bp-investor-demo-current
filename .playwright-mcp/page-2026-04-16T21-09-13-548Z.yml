        - generic [ref=e84]:
          - generic [ref=e85]: Module Outcome
          - generic [ref=e86]: Record, process, and publish a complete Velo video end-to-end using Screen Capture — all in one sitting.
        - paragraph [ref=e87]: "Screen Capture is Velo's most direct input mode: you share your screen, narrate what you're doing, and Velo handles everything else. This module walks you through every step — from installing the Chrome extension to seeing your finished share link in the browser."
        - 'heading "Step 1: Install & Pin the Velo Companion Extension" [level=3] [ref=e88]'
        - list [ref=e89]:
          - listitem [ref=e90]:
            - generic [ref=e91]:
              - text: Open Chrome and go to the Chrome Web Store. Search
              - strong [ref=e92]: "\"Velo Companion\""
              - text: .
          - listitem [ref=e93]:
            - generic [ref=e94]:
              - text: Click
              - strong [ref=e95]: Add to Chrome
              - text: . When prompted, click
              - strong [ref=e96]: Add extension
              - text: .
          - listitem [ref=e97]:
            - generic [ref=e98]:
              - text: In your Chrome toolbar, click the puzzle piece icon (Extensions menu). Find Velo Companion and click the
              - strong [ref=e99]: pin icon
              - text: so it always shows in your toolbar.
          - listitem [ref=e100]:
            - generic [ref=e101]: Confirm the Velo icon appears in your toolbar. If it doesn't, the extension didn't install — try again in a fresh Chrome window.
        - 'heading "Step 2: Set Up Your Recording" [level=3] [ref=e102]'
        - paragraph [ref=e103]: "Click the Velo Companion icon to open the recording launcher. Before you hit Record, configure three things:"
        - generic [ref=e104]:
          - generic [ref=e105]:
            - generic [ref=e106]: Window / Tab Selection
            - paragraph [ref=e107]:
              - text: Choose
              - strong [ref=e108]: Tab
              - text: to capture a single browser tab (recommended — cleaner background). Use
              - strong [ref=e109]: Window
              - text: only if your demo spans multiple apps.
          - generic [ref=e110]:
            - generic [ref=e111]: Resolution
            - paragraph [ref=e112]: Record at your screen's native resolution. Don't zoom in your browser before recording — Velo handles visual zoom in the editor afterward.
          - generic [ref=e113]:
            - generic [ref=e114]: Microphone Check
            - paragraph [ref=e115]: Confirm the correct mic is selected. Speak a test phrase. If the level bar doesn't move, switch input devices before proceeding.
        - 'heading "Step 3: Record Well" [level=3] [ref=e116]'
        - paragraph [ref=e117]: "Your narration and cursor movement directly shape the AI script Velo generates. Use this technique:"
        - list [ref=e118]:
          - listitem [ref=e119]:
            - strong [ref=e120]: Slow your clicks.
            - text: Pause 1–2 seconds after each click so Velo can recognize the action before you move on.
          - listitem [ref=e121]:
            - strong [ref=e122]: Narrate naturally.
            - text: Speak like you're showing a colleague — avoid scripting or over-enunciating. The AI rewrites it anyway.
          - listitem [ref=e123]:
            - strong [ref=e124]: Pause before transitions.
            - text: When moving between sections of the product, take a breath. This gives Velo clean segment breaks.
          - listitem [ref=e125]:
            - strong [ref=e126]: Filler words are fine.
            - text: "\"Um\", \"uh\", and \"so\" are stripped by the AI. Long mid-sentence pauses are more disruptive than filler words."
        - 'heading "Step 4: What Happens After You Stop Recording" [level=3] [ref=e127]'
        - paragraph [ref=e128]:
          - text: When you click
          - strong [ref=e129]: Stop
          - text: ", Velo's AI pipeline starts immediately. Do not close the tab. Here's what's happening:"
        - list [ref=e130]:
          - listitem [ref=e131]:
            - generic [ref=e132]: Velo analyzes your recording — cursor position, click events, timing, and UI content visible on screen.
          - listitem [ref=e133]:
            - generic [ref=e134]: "A script is generated: one line per segment, one segment per distinct action."
          - listitem [ref=e135]:
            - generic [ref=e136]: The script is passed to the voice engine, which reads it using your selected VeloTwin voice.
          - listitem [ref=e137]:
            - generic [ref=e138]: The avatar is composited over the video — face, lip sync, and eye movement all happen at this stage.
          - listitem [ref=e139]:
            - generic [ref=e140]: You're placed into the Velo editor with the finished draft ready to review.
        - generic [ref=e141]:
          - strong [ref=e142]: "Processing time:"
          - text: A 3-minute recording typically takes 3–8 minutes to process, depending on server load. Don't refresh the page — processing continues in the background even if the progress indicator looks stuck.
        - 'heading "Step 5: Your First Look at the Editor" [level=3] [ref=e143]'
        - paragraph [ref=e144]: "In this module, accept the auto-generated script as-is. Don't edit yet — script editing is covered in Module 5. For now, just observe:"
        - list [ref=e145]:
          - listitem [ref=e146]:
            - text: The
            - strong [ref=e147]: Scripts panel
            - text: (right sidebar) shows the narration text broken into segments. Each line corresponds to one video chunk.
          - listitem [ref=e148]:
            - text: The
            - strong [ref=e149]: timeline
            - text: at the bottom shows your video laid out over time. Each segment appears as a block.
          - listitem [ref=e150]:
            - text: The
            - strong [ref=e151]: Face panel
            - text: (right sidebar) lets you choose or switch your VeloTwin voice and avatar.
        - 'heading "Step 6: Choose a Public VeloTwin & Publish" [level=3] [ref=e152]'
        - paragraph [ref=e153]: If you don't have a custom VeloTwin yet, open the Face panel and choose one of Velo's public avatars. Pick one whose tone matches your content — professional and neutral is a safe default for a first video.
        - paragraph [ref=e154]:
          - text: Once you've selected a voice, click
          - strong [ref=e155]: Publish
          - text: . Velo finalizes the render and generates your
          - strong [ref=e156]: share link
          - text: . Copy it and open it in a new tab to see exactly what your recipients will see.
        - heading "Common Failure Points" [level=3] [ref=e157]
        - generic [ref=e158]:
          - generic [ref=e159]:
            - generic [ref=e160]: Connection Drops
            - paragraph [ref=e161]: If your internet disconnects mid-recording, the upload fails silently. Record on a stable connection and keep the browser tab active throughout.
          - generic [ref=e162]:
            - generic [ref=e163]: Blocked Permissions
            - paragraph [ref=e164]: If Chrome doesn't ask to use your mic, permissions are blocked. Go to Chrome Settings → Privacy → Microphone and allow velo.video.
          - generic [ref=e165]:
            - generic [ref=e166]: Full Desktop vs. Tab
            - paragraph [ref=e167]: Sharing full desktop includes your taskbar, notifications, and other apps. Always share a specific tab unless you genuinely need multi-app coverage in your demo.
