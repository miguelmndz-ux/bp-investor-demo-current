          - heading "Record & Publish Your First Velo" [level=4] [ref=e185]
          - paragraph [ref=e186]: "Goal: complete a full Velo production loop — from recording to share link — in one session."
          - list [ref=e187]:
            - listitem [ref=e188]: Open Chrome and navigate to any product or app you know well. It can be a simple settings page or a website you use daily.
            - listitem [ref=e189]: Click the Velo Companion icon, configure your recording (select the tab, confirm mic is active), and click Record.
            - listitem [ref=e190]: Record a 60–90 second walkthrough. Narrate naturally, slow your clicks, and pause between sections. Stop the recording when done.
            - listitem [ref=e191]: Wait for processing to complete. Do not close the tab or refresh.
            - listitem [ref=e192]: When the editor loads, open the Scripts panel and read the auto-generated script. Note what the AI captured accurately and where it missed the point — you'll learn to fix this in Module 5.
            - listitem [ref=e193]: Select any public VeloTwin voice from the Face panel.
            - listitem [ref=e194]: Click Publish. Copy the share link and open it in a new browser tab. Confirm the video plays correctly.
            - listitem [ref=e195]: "Write down 2–3 observations: How accurate was the script? How natural does the avatar look? What would you change on your next recording?"
